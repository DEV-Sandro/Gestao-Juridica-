<div class="login-wrapper fade-in">
  <div class="login-card card-glass">
    
    <div class="brand-header">
      <div class="logo-shield"><mat-icon>balance</mat-icon></div>
      <h1 class="font-heading">JustaPro</h1>
    </div>

    <form (ngSubmit)="acessar()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>E-mail Profissional</mat-label>
        <mat-icon matPrefix class="icon-muted">email</mat-icon>
        <input matInput type="email" placeholder="nome@escritorio.com" [(ngModel)]="email" name="email" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha de Acesso</mat-label>
        <mat-icon matPrefix class="icon-muted">lock</mat-icon>
        <input matInput [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha" name="senha" required>
        <button mat-icon-button matSuffix type="button" (click)="mostrarSenha = !mostrarSenha">
          <mat-icon class="icon-muted">{{ mostrarSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <div class="form-options">
        <mat-checkbox color="primary">Lembrar de mim</mat-checkbox>
        <a href="#" class="forgot-link">Esqueceu a senha?</a>
      </div>

      <button mat-flat-button class="btn-premium" type="submit" [disabled]="carregando">
        {{ carregando ? 'Autenticando...' : 'Acessar Workspace' }}
      </button>
    </form>
    
  </div>
</div>
